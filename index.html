<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پنل مدیریت</title>

    <!-- link-css-bootstrap -->
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./bootstrap/css/bootstrap-grid.css" />
    <link rel="stylesheet" href="./bootstrap/css/bootstrap-reboot.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
    />

    <!-- link-style -->
    <link rel="stylesheet" href="./style/index.css" />
  </head>
  <body>
    <header>
      <nav
        class="nav-top-mobile d-flex justify-content-around align-items-center"
      >
        <div class="col-1 div-hamburger">
          <span>
            <i class="bi bi-list"></i>
          </span>
        </div>
        <div class="col-5 profile">
          <img src="Images/profile.png" />
          <span>علی موسوی</span>
        </div>
        <div class="col-5 search-box">
          <span><i class="bi bi-search"></i></span>
          <input type="text" placeholder="جستجو..." />
        </div>
      </nav>
    </header>

    <div class="div-sidebar">
      <nav class="sidebar">
        <div class="logo-details">
          <img src="./Images/logo.png" class="img-fluid" alt="" />
        </div>

        <div class="menu">
          <ul class="menu-links">
            <li class="link">
              <a href="#">
                <div class="link_details">
                  <span style="--c: rgba(6, 188, 24, 0.67)" class="link_icon">
                    <i class="bi bi-columns-gap"></i>
                  </span>
                  <span class="link_name">داشبورد</span>
                </div>
              </a>
            </li>
            <li class="link active">
              <a href="#">
                <div class="link_details">
                  <span style="--c: rgba(6, 188, 24, 1)" class="link_icon"
                    ><i class="bi bi-cart"></i
                  ></span>
                  <span class="link_name">فروشگاه</span>
                </div>
                <span class="link_arrow"
                  ><i class="bi bi-caret-down-fill"></i
                ></span>
              </a>

              <ul class="sub-menu">
                <li><a href="#">مدیریت فروشگاه</a></li>
                <li><a href="#">مدیریت فروشگاه</a></li>
                <li><a href="#">مدیریت فروشگاه</a></li>
              </ul>
            </li>
            <li class="link">
              <a href="#">
                <div class="link_details">
                  <span style="--c: rgba(6, 188, 24, 0.67)" class="link_icon"
                    ><i class="bi bi-basket"></i
                  ></span>
                  <span class="link_name">سفارشات و سبد</span>
                </div>
                <span class="link_arrow"
                  ><i class="bi bi-caret-down-fill"></i
                ></span>
              </a>
            </li>
          </ul>
        </div>

        <div class="logout">
          <a href="#">
            <span class="logout_icon"
              ><i class="bi bi-box-arrow-left"></i
            ></span>
            <span class="logout_name">خروج از حساب</span>
          </a>
        </div>
      </nav>
    </div>

    <footer>
      <nav class="nav-bottom"></nav>
    </footer>

    <!-- link-js-bootstrap -->
    <script src="./bootstrap/js/bootstrap.js"></script>
    <script src="./bootstrap/js/bootstrap.min.js"></script>
    <script src="./bootstrap/js/bootstrap.bundle.js"></script>

    <script>
      const sub_menues = document.querySelectorAll("#sub-menu");
      const sub_menu = document.getElementById("sub-menu");
      sub_menu.addEventListener("click", () => {
        sub_menues.forEach((s) => {
          s.classList.remove("open");
        });
        sub_menu.classList.add("open");
      });
    </script>
  </body>
</html>
